name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            felidae/package-lock.json
            canidae/package-lock.json
            equidae/package-lock.json
            giraffidae/package-lock.json
            caprinae/package-lock.json
            suidae/package-lock.json
            phasianidae/package-lock.json
            anatidae/package-lock.json
            cervidae/package-lock.json
            portal/package-lock.json

      - name: Install Felidae deps
        working-directory: felidae
        run: npm ci

      - name: Link shared node_modules
        run: ln -s "$(pwd)/felidae/node_modules" shared/node_modules

      - name: Build Felidae
        working-directory: felidae
        run: npm run build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/felidae/

      - name: Install Canidae deps
        working-directory: canidae
        run: npm ci

      - name: Build Canidae
        working-directory: canidae
        run: npm run build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/canidae/

      - name: Install Giraffidae deps
        working-directory: giraffidae
        run: npm ci

      - name: Build Giraffidae
        working-directory: giraffidae
        run: npm run build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/giraffidae/

      - name: Install Equidae deps
        working-directory: equidae
        run: npm ci

      - name: Build Equidae
        working-directory: equidae
        run: npm run build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/equidae/

      - name: Install Caprinae deps
        working-directory: caprinae
        run: npm ci

      - name: Build Caprinae
        working-directory: caprinae
        run: npm run build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/caprinae/

      - name: Install Suidae deps
        working-directory: suidae
        run: npm ci

      - name: Build Suidae
        working-directory: suidae
        run: npm run build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/suidae/

      - name: Install Phasianidae deps
        working-directory: phasianidae
        run: npm ci

      - name: Build Phasianidae
        working-directory: phasianidae
        run: npm run build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/phasianidae/

      - name: Install Anatidae deps
        working-directory: anatidae
        run: npm ci

      - name: Build Anatidae
        working-directory: anatidae
        run: npm run build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/anatidae/

      - name: Install Cervidae deps
        working-directory: cervidae
        run: npm ci

      - name: Build Cervidae
        working-directory: cervidae
        run: npm run build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/cervidae/

      - name: Install Portal deps
        working-directory: portal
        run: npm ci

      - name: Build Portal
        working-directory: portal
        run: npm run build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/

      - name: Assemble Pages output
        run: |
          mkdir -p _site/felidae _site/canidae _site/equidae _site/giraffidae _site/caprinae _site/suidae _site/phasianidae _site/anatidae _site/cervidae
          cp -r felidae/dist/. _site/felidae/
          cp -r canidae/dist/. _site/canidae/
          cp -r equidae/dist/. _site/equidae/
          cp -r giraffidae/dist/. _site/giraffidae/
          cp -r caprinae/dist/. _site/caprinae/
          cp -r suidae/dist/. _site/suidae/
          cp -r phasianidae/dist/. _site/phasianidae/
          cp -r anatidae/dist/. _site/anatidae/
          cp -r cervidae/dist/. _site/cervidae/
          cp -r portal/dist/. _site/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

      - name: Notify Claude Code on failure
        if: failure()
        env:
          ROUTINE_FIRE_URL: ${{ secrets.ROUTINE_FIRE_URL }}
          ROUTINE_FIRE_TOKEN: ${{ secrets.ROUTINE_FIRE_TOKEN }}
        run: |
          curl -sS -X POST "$ROUTINE_FIRE_URL" \
            -H "Authorization: Bearer $ROUTINE_FIRE_TOKEN" \
            -H "anthropic-version: 2023-06-01" \
            -H "anthropic-beta: experimental-cc-routine-2026-04-01" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"Build failed: $GITHUB_WORKFLOW run $GITHUB_RUN_ID on $GITHUB_REF. See: https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID\"}"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

      - name: Summary
        run: |
          REPO=${{ github.event.repository.name }}
          OWNER=${{ github.repository_owner }}
          echo "### Deployed" >> $GITHUB_STEP_SUMMARY
          echo "- 🐱 [Felidae](https://${OWNER}.github.io/${REPO}/felidae/)" >> $GITHUB_STEP_SUMMARY
          echo "- 🐕 [Canidae](https://${OWNER}.github.io/${REPO}/canidae/)" >> $GITHUB_STEP_SUMMARY
          echo "- 🐴 [Equidae](https://${OWNER}.github.io/${REPO}/equidae/)" >> $GITHUB_STEP_SUMMARY
          echo "- 🦒 [Giraffidae](https://${OWNER}.github.io/${REPO}/giraffidae/)" >> $GITHUB_STEP_SUMMARY
          echo "- 🐐 [Caprinae](https://${OWNER}.github.io/${REPO}/caprinae/)" >> $GITHUB_STEP_SUMMARY
          echo "- 🐷 [Suidae](https://${OWNER}.github.io/${REPO}/suidae/)" >> $GITHUB_STEP_SUMMARY
          echo "- 🐓 [Phasianidae](https://${OWNER}.github.io/${REPO}/phasianidae/)" >> $GITHUB_STEP_SUMMARY
          echo "- 🦆 [Anatidae](https://${OWNER}.github.io/${REPO}/anatidae/)" >> $GITHUB_STEP_SUMMARY
          echo "- 🦌 [Cervidae](https://${OWNER}.github.io/${REPO}/cervidae/)" >> $GITHUB_STEP_SUMMARY
          echo "- 🌍 [Portal](https://${OWNER}.github.io/${REPO}/)" >> $GITHUB_STEP_SUMMARY
