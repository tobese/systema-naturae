name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            mammalia/carnivora/felidae/package-lock.json
            mammalia/carnivora/canidae/package-lock.json
            portal/package-lock.json

      - name: Install Felidae deps
        working-directory: mammalia/carnivora/felidae
        run: npm ci

      - name: Link shared node_modules
        run: ln -s "$(pwd)/mammalia/carnivora/felidae/node_modules" shared/node_modules

      - name: Build Felidae
        working-directory: mammalia/carnivora/felidae
        run: npm run build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/felidae/

      - name: Install Canidae deps
        working-directory: mammalia/carnivora/canidae
        run: npm ci

      - name: Build Canidae
        working-directory: mammalia/carnivora/canidae
        run: npm run build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/canidae/

      - name: Install Portal deps
        working-directory: portal
        run: npm ci

      - name: Build Portal
        working-directory: portal
        run: npm run build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/

      - name: Assemble Pages output
        run: |
          mkdir -p _site/felidae _site/canidae
          cp -r mammalia/carnivora/felidae/dist/. _site/felidae/
          cp -r mammalia/carnivora/canidae/dist/. _site/canidae/
          cp -r portal/dist/. _site/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

      - name: Notify Claude Code on failure
        if: failure()
        env:
          ROUTINE_FIRE_URL: ${{ secrets.ROUTINE_FIRE_URL }}
          ROUTINE_FIRE_TOKEN: ${{ secrets.ROUTINE_FIRE_TOKEN }}
        run: |
          curl -sS -X POST "$ROUTINE_FIRE_URL" \
            -H "Authorization: Bearer $ROUTINE_FIRE_TOKEN" \
            -H "anthropic-version: 2023-06-01" \
            -H "anthropic-beta: experimental-cc-routine-2026-04-01" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"Build failed: $GITHUB_WORKFLOW run $GITHUB_RUN_ID on $GITHUB_REF. See: https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID\"}"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

      - name: Summary
        run: |
          REPO=${{ github.event.repository.name }}
          OWNER=${{ github.repository_owner }}
          echo "### Deployed" >> $GITHUB_STEP_SUMMARY
          echo "- 🐱 [Felidae](https://${OWNER}.github.io/${REPO}/felidae/)" >> $GITHUB_STEP_SUMMARY
          echo "- 🐕 [Canidae](https://${OWNER}.github.io/${REPO}/canidae/)" >> $GITHUB_STEP_SUMMARY
          echo "- 🌍 [Portal](https://${OWNER}.github.io/${REPO}/)" >> $GITHUB_STEP_SUMMARY
