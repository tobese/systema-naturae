name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            felidae/package-lock.json
            canidae/package-lock.json
            equidae/package-lock.json
            giraffidae/package-lock.json
            caprinae/package-lock.json
            suidae/package-lock.json

      - name: Install Felidae deps
        working-directory: felidae
        run: npm ci

      - name: Link shared node_modules
        run: ln -s "$(pwd)/felidae/node_modules" shared/node_modules

      - name: Build Felidae
        working-directory: felidae
        run: npm run build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/felidae/

      - name: Install Canidae deps
        working-directory: canidae
        run: npm ci

      - name: Build Canidae
        working-directory: canidae
        run: npm run build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/canidae/

      - name: Install Giraffidae deps
        working-directory: giraffidae
        run: npm ci

      - name: Build Giraffidae
        working-directory: giraffidae
        run: npm run build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/giraffidae/

      - name: Install Equidae deps
        working-directory: equidae
        run: npm ci

      - name: Build Equidae
        working-directory: equidae
        run: npm run build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/equidae/

      - name: Install Caprinae deps
        working-directory: caprinae
        run: npm ci

      - name: Build Caprinae
        working-directory: caprinae
        run: npm run build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/caprinae/

      - name: Install Suidae deps
        working-directory: suidae
        run: npm ci

      - name: Build Suidae
        working-directory: suidae
        run: npm run build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/suidae/

      - name: Assemble Pages output
        run: |
          mkdir -p _site/felidae _site/canidae _site/equidae _site/giraffidae _site/caprinae _site/suidae
          cp -r felidae/dist/. _site/felidae/
          cp -r canidae/dist/. _site/canidae/
          cp -r equidae/dist/. _site/equidae/
          cp -r giraffidae/dist/. _site/giraffidae/
          cp -r caprinae/dist/. _site/caprinae/
          cp -r suidae/dist/. _site/suidae/
          cat > _site/index.html << 'EOF'
          <!doctype html>
          <html>
            <head>
              <meta charset="UTF-8">
              <title>Systema Naturae</title>
              <meta http-equiv="refresh" content="0; url=felidae/">
            </head>
            <body>
              <a href="felidae/">Felidae</a> · <a href="canidae/">Canidae</a> · <a href="equidae/">Equidae</a> · <a href="giraffidae/">Giraffidae</a> · <a href="caprinae/">Caprinae</a> · <a href="suidae/">Suidae</a>
            </body>
          </html>
          EOF

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

      - name: Summary
        run: |
          REPO=${{ github.event.repository.name }}
          OWNER=${{ github.repository_owner }}
          echo "### Deployed" >> $GITHUB_STEP_SUMMARY
          echo "- 🐱 [Felidae](https://${OWNER}.github.io/${REPO}/felidae/)" >> $GITHUB_STEP_SUMMARY
          echo "- 🐕 [Canidae](https://${OWNER}.github.io/${REPO}/canidae/)" >> $GITHUB_STEP_SUMMARY
          echo "- 🐴 [Equidae](https://${OWNER}.github.io/${REPO}/equidae/)" >> $GITHUB_STEP_SUMMARY
          echo "- 🦒 [Giraffidae](https://${OWNER}.github.io/${REPO}/giraffidae/)" >> $GITHUB_STEP_SUMMARY
          echo "- 🐐 [Caprinae](https://${OWNER}.github.io/${REPO}/caprinae/)" >> $GITHUB_STEP_SUMMARY
          echo "- 🐷 [Suidae](https://${OWNER}.github.io/${REPO}/suidae/)" >> $GITHUB_STEP_SUMMARY
